<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XtreamHub - Everything you need in one Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/components.css">

<body>
    <!-- Header start -->
     <header>
        <div class="container">
            <nav class="navbar">
                <div class="logo">

                    XtreamHub

                </div>
                <ul class="nav-links">
                    <li><a href="#">Tools</a></li>
                    <li><a href="#">AI</a></li>
                    <li><a href="#">PDF</a></li>
                    <li><a href="#">Developers</a></li>
                    <li><a href="#">Blog</a></li>

                        <button>🌙</button>

                    </div>
            </nav>
        </div>

     <main>

                    <div class="hero-search">

                    </div>

                    <div class="popular-tags">
                        <span>AI</span>
                        <span>PDF</span>
                        <span>Calculator</span>

                </div>

            </div>

        </section>

        <section class="categories">

                <p>Find the perfect tool in seconds</p>

                <!-- Cards -->

    <footer>

    </footer>
